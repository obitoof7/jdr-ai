<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JDR Bleach - IA</title>
    <style>
        body { background: #111; color: #eee; font-family: Arial, sans-serif; padding: 20px; }
        #entete {
            max-width: 700px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #aaa;
            font-size: 14px;
        }
        #btn-deconnexion {
            color: #f66;
            text-decoration: none;
            border: 1px solid #f66;
            padding: 4px 10px;
            border-radius: 5px;
        }
        #btn-deconnexion:hover {
            background: #f66;
            color: #111;
        }
        #chat { max-width: 700px; margin: auto; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; }
        .joueur { background: #2a4d69; text-align: right; }
        .autre-joueur { background: #4a2a69; }
        .autre-joueur .nom-auteur { color: #c9a; font-size: 12px; display: block; margin-bottom: 4px; }
        .mj { background: #333; }
        #zone-saisie { display: flex; max-width: 700px; margin: 20px auto; }
        #action { flex: 1; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="entete">
        <span>Connecté en tant que <strong>{{ pseudo }}</strong></span>
        <a href="/deconnexion" id="btn-deconnexion">Déconnexion</a>
    </div>
    <div id="chat"></div>
    <div id="zone-saisie">
        <input type="text" id="action" placeholder="Que fais-tu ?">
        <button onclick="envoyer()">Envoyer</button>
    </div>

    <script>
        const monPseudo = "{{ pseudo }}";
        let dernierId = 0;

        async function envoyer() {
            const input = document.getElementById("action");
            const texte = input.value.trim();
            if (!texte) return;

            input.value = "";
            input.disabled = true;

            await fetch("/jouer", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: texte })
            });

            input.disabled = false;
            input.focus();
            chargerMessages();
        }

        function ajouterMessage(msg) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");

            if (msg.role === "assistant") {
                div.className = "message mj";
                div.textContent = msg.contenu;
            } else if (msg.auteur === monPseudo) {
                div.className = "message joueur";
                div.textContent = msg.contenu;
            } else {
                div.className = "message autre-joueur";
                const nom = document.createElement("span");
                nom.className = "nom-auteur";
                nom.textContent = msg.auteur;
                div.appendChild(nom);
                div.appendChild(document.createTextNode(msg.contenu));
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function chargerMessages() {
            const reponse = await fetch(`/messages?apres=${dernierId}`);
            const nouveaux = await reponse.json();
            nouveaux.forEach(msg => {
                ajouterMessage(msg);
                dernierId = msg.id;
            });
        }

        document.getElementById("action").addEventListener("keypress", function(e) {
            if (e.key === "Enter") envoyer();
        });

        chargerMessages();
        setInterval(chargerMessages, 2000);
    </script>
</body>
</html>
